name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: referral
          POSTGRES_USER: referral
          POSTGRES_PASSWORD: dev_only_referral_pw
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://referral:dev_only_referral_pw@localhost:5432/referral
      REDIS_URL: redis://localhost:6379
      SHORT_DOMAIN: partner.711web.com
      NODE_ENV: test
      AUTH_SECRET: ci-only-not-secret-32-chars-abcdefghij
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.3
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm db:push
      - run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH and run deploy.sh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /srv/referral-platform
            bash deploy/scripts/deploy.sh

      - name: Production smoke
        run: |
          curl -fsS -o /dev/null -w "homepage: %{http_code}\n" https://partner.711web.com/
          curl -fsS -o /dev/null -w "go/demo: %{http_code}\n" -I https://partner.711web.com/go/demo
